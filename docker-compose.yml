services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: parsify-dev:latest
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
