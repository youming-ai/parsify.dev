name = "parsify-dev"
main = "src/worker.ts"
compatibility_date = "2026-05-19"

# Native edge rate limiting — atomic, no Durable Object migration (so it stays
# compatible with `wrangler versions upload`). period must be 10 or 60 seconds.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[assets]
binding = "ASSETS"
directory = "dist/client"
not_found_handling = "single-page-application"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
