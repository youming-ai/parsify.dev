# Parsify.dev - AI & LLM Developer Tools
# Deployed via Cloudflare Workers Builds (Git integration) using Astro + @astrojs/cloudflare
# Worker entry: dist/_worker.js/index.js (generated by adapter)
# Static assets: served from dist/ via the ASSETS binding

name = "parsify-dev"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-28"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[vars]
ENVIRONMENT = "production"
